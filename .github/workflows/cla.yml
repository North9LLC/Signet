name: CLA Check

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://raw.githubusercontent.com/North9LLC/cla/main/cla.md
          branch: main
          allowlist: bot*,*[bot],dependabot*
          remote-organization-name: North9LLC
          remote-repo-name: cla
